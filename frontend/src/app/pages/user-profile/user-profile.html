<div *ngIf="loading">Ładowanie profilu...</div>

<div *ngIf="user && !loading" class="profile">
  <img
    *ngIf="user.profile_image"
    [src]="'http://localhost:8000' + user.profile_image"
    alt="Profile image"
    class="avatar"
  />

  <h2>{{ user.first_name }}</h2>

  <p><strong>Email:</strong> {{ user.email }}</p>
  <p><strong>Płeć:</strong> {{ user.gender }}</p>
  <p><strong>Wiek:</strong> {{ user.age }}</p>
  <p><strong>Data urodzenia:</strong> {{ user.birth_date }}</p>

  <p class="bio">
    <strong>Bio:</strong><br />
    {{ user.bio }}
  </p>

  <p class="created">
    Konto utworzone: {{ user.created_at | date: 'longDate' }}
  </p>
</div>
