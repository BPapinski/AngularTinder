<div class="chat-layout" [class.chat-open]="selectedUser">

  <aside class="matches">
  <h3 class="matches-title">Twoje pary</h3>

  <div
    *ngFor="let m of matches$ | async"
    class="match-row"
    [class.active]="selectedUser && m.id === selectedUser.id"
    (click)="selectUser(m)"
  >
    <div class="avatar">
      <img [src]="getProfileImage(m.profile_image)" />
    </div>

    <div class="info">
      <div class="name">{{ m.first_name }}</div>
      <div class="sub">Kliknij aby otworzyć czat</div>
    </div>

    <div class="chevron">
      <span
        *ngIf="(notificationService.unreadPerUser()[m.id] ?? 0) > 0"
        class="unread-badge"
      >{{ notificationService.unreadPerUser()[m.id] }}</span>
      <span *ngIf="(notificationService.unreadPerUser()[m.id] ?? 0) === 0">›</span>
    </div>
  </div>
</aside>

  <section class="chat">
    <ng-container *ngIf="selectedUser; else empty">
      <div class="chat-header">
        <button class="back-btn" (click)="goBack()">←</button>
        <div class="avatar small">
          <img [src]="getProfileImage(selectedUser.profile_image)" alt="" />
        </div>
        <h3>{{ selectedUser.first_name }}</h3>
      </div>

      <div class="messages" #messagesContainer>
  <div
    *ngFor="let msg of messages"
    class="bubble"
    [class.mine]="msg.is_me"
  >
    {{ msg.content }}
  </div>
</div>

      <div class="input">
        <input
          [(ngModel)]="newMessage"
          (keyup.enter)="send()"
          placeholder="Napisz wiadomość..."
        />
        <button (click)="send()">Wyślij</button>
      </div>
    </ng-container>

    <ng-template #empty>
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <h3>Wybierz rozmowę</h3>
        <p>Kliknij parę z listy po lewej, aby rozpocząć czat.</p>
      </div>
    </ng-template>
  </section>

</div>
