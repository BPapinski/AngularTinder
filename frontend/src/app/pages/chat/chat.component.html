<div class="chat-layout">

  <aside class="matches">
    <h3>Matche</h3>
    <div
      *ngFor="let m of matches"
      (click)="selectUser(m)"
      class="match"
      [class.active]="m === selectedUser"
    >
      {{ m.first_name }}
    </div>
  </aside>

  <section class="chat">
    <ng-container *ngIf="selectedUser; else empty">
      <h3>{{ selectedUser.first_name }}</h3>

      <div class="messages">
        <div
          *ngFor="let msg of messages"
          class="message"
        >
          <b>{{ msg.sender.first_name }}:</b> {{ msg.content }}
        </div>
      </div>

      <div class="input">
        <input [(ngModel)]="newMessage" placeholder="Napisz wiadomość..." />
        <button (click)="send()">Wyślij</button>
      </div>
    </ng-container>

    <ng-template #empty>
      <p>Wybierz match, aby zacząć rozmowę</p>
    </ng-template>
  </section>

</div>
