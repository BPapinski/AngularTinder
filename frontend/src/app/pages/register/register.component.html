<div class="register-page">

  <div class="register-card">
    <h2>Utwórz konto</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" />
      </div>

      <div class="form-group">
        <label>Hasło</label>
        <input type="password" formControlName="password" />
      </div>

      <div class="form-group">
        <label>Imię</label>
        <input type="text" formControlName="first_name" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Płeć</label>
          <select formControlName="gender">
            <option value="M">Mężczyzna</option>
            <option value="F">Kobieta</option>
            <option value="O">Inna</option>
          </select>
        </div>

        <div class="form-group">
          <label>Szukam</label>
          <select formControlName="gender_preference">
            <option value="M">Mężczyzn</option>
            <option value="F">Kobiet</option>
            <option value="A">Dowolnie</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Data urodzenia</label>
        <input type="date" formControlName="birth_date" />
      </div>

      <div class="form-group">
        <label>Bio</label>
        <textarea rows="3" formControlName="bio"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Min. wiek</label>
          <input type="number" formControlName="min_preferred_age" />
        </div>

        <div class="form-group">
          <label>Maks. wiek</label>
          <input type="number" formControlName="max_preferred_age" />
        </div>
      </div>

      <div class="error" *ngIf="errorMessage()">
        {{ errorMessage() }}
      </div>

      <button class="register-btn" type="submit" [disabled]="loading()">
        Utwórz konto
      </button>

    </form>

    <div class="divider">masz już konto?</div>

    <button class="secondary-btn" (click)="goToLogin()">
      Zaloguj się
    </button>
  </div>

</div>
