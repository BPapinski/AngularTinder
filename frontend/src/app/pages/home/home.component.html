<div class="home-container">
  <ng-container *ngIf="authService.isLoggedIn(); else loginButton">

    <ng-container *ngIf="loading; else contentTpl">
      <div class="state-container">
        <div class="pulse-circle"></div>
        <p>Szukam Twojej drugiej połówki...</p>
      </div>
    </ng-container>

    <ng-template #contentTpl>
      <div class="state-container no-profiles" *ngIf="profiles.length === 0">
        <div class="empty-icon">💔</div>
        <h2>To już wszyscy!</h2>
        <p>Wróć później, szukamy nowych osób w Twojej okolicy.</p>
        <button class="action-btn refresh-btn" (click)="loadFeed()">
          Odśwież
        </button>
      </div>

      <div class="cards-stack" *ngIf="profiles.length > 0">
        <div
          class="tinder-card"
          [ngStyle]="{
            transform: 'translateX(' + translateX + 'px) rotate(' + rotate + 'deg)'
          }"
          (pointerdown)="onPointerDown($event)"
          (pointermove)="onPointerMove($event)"
          (pointerup)="onPointerUp()"
          (pointercancel)="onPointerUp()"
        >

          <div class="card-image-wrapper">
             <img
              *ngIf="profiles[0].profile_image; else placeholder"
              [src]="profiles[0].profile_image"
              alt="Profile"
            />
            <ng-template #placeholder>
              <div class="placeholder-img">
                {{ profiles[0].first_name.charAt(0) || '?' }}
              </div>
            </ng-template>

            <div class="card-overlay"></div>
          </div>

          <div class="card-content">
            <div class="info-text">
              <h2>
                {{ profiles[0].first_name }}
                <span class="age" *ngIf="profiles[0].age">{{ profiles[0].age }}</span>
              </h2>
              <p class="bio" *ngIf="profiles[0].bio">
                {{ profiles[0].bio }}
              </p>
              <p class="bio muted" *ngIf="!profiles[0].bio">Brak opisu</p>
            </div>

            <div class="action-buttons">
              <button class="btn-circle pass" (click)="forcePass()" title="Pass">
                ✕
              </button>
              <button class="btn-circle smash" (click)="forceSmash()" title="Smash">
                ♥
              </button>
            </div>
          </div>

        </div>
      </div>
    </ng-template>
  </ng-container>

  <ng-template #loginButton>
    <div class="state-container">
      <h1>Witaj!</h1>
      <p>Zaloguj się, aby zacząć poznawać ludzi.</p>
      <button class="action-btn" (click)="login()">Zaloguj się</button>
    </div>
  </ng-template>
</div>
