<div class="home-container">
  <h1>Dating App</h1>

  <!-- JEŚLI ZALOGOWANY -->
  <ng-container *ngIf="authService.isLoggedIn(); else loginButton">

    <div class="header-actions">
      <button class="profile-btn" (click)="goToProfile()">
        Mój profil
      </button>

      <button (click)="logout()">Wyloguj</button>
    </div>

    <!-- LOADING -->
    <ng-container *ngIf="loading; else contentTpl">
      <p>Ładowanie feedu...</p>
    </ng-container>

    <!-- CONTENT -->
    <ng-template #contentTpl>

      <div *ngIf="profiles.length === 0">
        Brak osób w Twojej okolicy.
      </div>

      <!-- SWIPE AREA -->
      <div class="profiles" *ngIf="profiles.length > 0">

        <div
          class="profile-card"
          [ngStyle]="{
            transform: 'translateX(' + translateX + 'px) rotate(' + rotate + 'deg)'
          }"
          (pointerdown)="onPointerDown($event)"
          (pointermove)="onPointerMove($event)"
          (pointerup)="onPointerUp()"
          (pointercancel)="onPointerUp()"
        >

          <!-- ZDJĘCIE / PLACEHOLDER -->
          <img
            *ngIf="profiles[0].profile_image; else placeholder"
            [src]="profiles[0].profile_image"
            alt="Zdjęcie profilowe"
          />

          <ng-template #placeholder>
            <div class="placeholder-img">
              {{ profiles[0].first_name?.charAt(0) || '?' }}
            </div>
          </ng-template>

          <!-- INFO -->
          <h3>
            {{ profiles[0].first_name || 'Nieznane imię' }}
            <span *ngIf="profiles[0].age">({{ profiles[0].age }})</span>
          </h3>

          <p *ngIf="profiles[0].bio; else noBio">
            {{ profiles[0].bio }}
          </p>

          <ng-template #noBio>
            <p class="muted">Brak opisu</p>
          </ng-template>

          <!-- AKCJE -->
          <div class="profile-actions">
            <button class="pass-btn" (click)="forcePass()">Pass</button>
            <button class="smash-btn" (click)="forceSmash()">Smash</button>
          </div>

        </div>
      </div>

    </ng-template>

  </ng-container>

  <!-- JEŚLI NIEZALOGOWANY -->
  <ng-template #loginButton>
    <button (click)="login()">Zaloguj się</button>
  </ng-template>
</div>
