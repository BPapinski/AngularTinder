<header class="app-header">
  <div class="header-content">

    <a routerLink="/" class="logo">
      Love<span class="highlight">App</span>
    </a>

    <nav class="main-nav" *ngIf="authService.isLoggedIn()">
  <a
    routerLink="/"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <span class="nav-icon">🔍</span>
    <span class="nav-text">Odkrywaj</span>
  </a>

  <a
    routerLink="/matches"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <span class="nav-icon">💘</span>
    <span class="nav-text">Pary</span>
    <span class="badge" *ngIf="notificationService.newMatches() > 0">{{ notificationService.newMatches() }}</span>
  </a>

  <a
    routerLink="/chat"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <span class="nav-icon">💬</span>
    <span class="nav-text">Chaty</span>
    <span class="badge" *ngIf="notificationService.unreadMessages() > 0">{{ notificationService.unreadMessages() }}</span>
  </a>
</nav>

    <div class="user-section">

      <div
        class="user-dropdown-container"
        *ngIf="authService.isLoggedIn(); else loginBtn"
      >

        <div class="user-trigger">
          <img
            [src]="getProfileImageUrl()"
            class="user-avatar"
            alt="Avatar"
            (error)="img.src='assets/placeholder-user.svg'"
            #img
          >

          <span class="user-name">
            {{ user?.first_name || user?.email || 'Użytkownik' }}
          </span>

          <span class="chevron">▼</span>
        </div>

        <div class="dropdown-menu">
          <div class="menu-header">
            <small>Zalogowany jako</small>
            <strong>{{ user?.email }}</strong>
          </div>

          <a routerLink="/profile" class="dropdown-item">
            👤 Twój Profil
          </a>

          <div class="divider"></div>

          <button (click)="logout()" class="dropdown-item logout">
            🚪 Wyloguj się
          </button>
        </div>

      </div>

      <ng-template #loginBtn>
        <a routerLink="/login" class="login-btn">
          Zaloguj się
        </a>
      </ng-template>

    </div>

  </div>
</header>
