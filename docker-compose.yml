
services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DJANGO_SECRET_KEY=zmien_mnie_na_super_tajny_klucz_dla_dev
      - DJANGO_SETTINGS_MODULE=config.settings
      - REDIS_HOST=redis
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    depends_on:
      - redis

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true

  redis:
    image: redis:7
    ports:
      - "6379:6379"
