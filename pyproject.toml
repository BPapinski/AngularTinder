[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "C90",
    "B",
    "S",
    "I",
]
ignore = ["E402"]

[tool.ruff.lint.extend-per-file-ignores]
"**/migrations/*.py" = ["E501"]

[tool.mypy]
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
ignore_missing_imports = true

[tool.django-stubs]
django_settings_module = "config.settings"
